name: Rename Vercel Project
on:
  workflow_dispatch:

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Rename Vercel project via API
        run: |
          curl -s -X PATCH \
            "https://api.vercel.com/v1/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer *** \
            -H "Content-Type: application/json" \
            -d '{"name": "amph-academy"}'
          echo ""
          echo "Project renamed. New URL: https://amph-academy.vercel.app"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

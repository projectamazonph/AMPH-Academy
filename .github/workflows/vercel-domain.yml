name: Add Vercel Domain

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain to add (e.g. amph-academy.vercel.app)'
        required: true
        default: 'amph-academy.vercel.app'

jobs:
  add-domain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Add domain to Vercel project
        run: |
          vercel domains add ${{ inputs.domain }} --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} --project=amph-academy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: List domains
        run: |
          echo "=== Current domains ==="
          vercel domains ls --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
